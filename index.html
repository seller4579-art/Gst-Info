<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>GSTIN INFO — DEMON API</title>
	<style>
    	* {
        	margin: 0;
        	padding: 0;
        	box-sizing: border-box;
    	}
    	body {
        	background: #0a0a0a;
        	color: #00ff41;
        	font-family: 'Courier New', monospace;
        	padding: 20px;
        	min-height: 100vh;
        	display: flex;
        	justify-content: center;
        	align-items: center;
    	}
    	.container {
        	max-width: 1000px;
        	width: 100%;
        	background: #0d0d0d;
        	border: 2px solid #00ff41;
        	border-radius: 12px;
        	padding: 25px;
        	box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
    	}
    	h1 {
        	text-align: center;
        	font-size: 28px;
        	border-bottom: 2px solid #00ff41;
        	padding-bottom: 15px;
        	margin-bottom: 20px;
        	text-shadow: 0 0 10px #00ff41;
        	letter-spacing: 3px;
    	}
    	.input-section {
        	display: flex;
        	gap: 10px;
        	flex-wrap: wrap;
        	margin-bottom: 25px;
    	}
    	.input-section input {
        	flex: 1;
        	padding: 12px 18px;
        	background: #111;
        	border: 2px solid #00ff41;
        	border-radius: 8px;
        	color: #00ff41;
        	font-size: 16px;
        	font-family: 'Courier New', monospace;
        	outline: none;
        	min-width: 200px;
    	}
    	.input-section input::placeholder {
        	color: #005500;
    	}
    	.input-section button {
        	padding: 12px 30px;
        	background: #00ff41;
        	color: #000;
        	border: none;
        	border-radius: 8px;
        	font-size: 16px;
        	font-weight: bold;
        	font-family: 'Courier New', monospace;
        	cursor: pointer;
        	transition: all 0.3s;
        	box-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
    	}
    	.input-section button:hover {
        	background: #00cc33;
        	transform: scale(1.02);
        	box-shadow: 0 0 25px rgba(0, 255, 65, 0.8);
    	}
    	.input-section button:active {
        	transform: scale(0.95);
    	}
    	.loader {
        	display: none;
        	text-align: center;
        	margin: 20px 0;
    	}
    	.loader span {
        	display: inline-block;
        	animation: blink 1s infinite;
        	font-size: 20px;
    	}
    	@keyframes blink {
        	0%, 100% { opacity: 1; }
        	50% { opacity: 0; }
    	}
    	#result {
        	margin-top: 20px;
    	}
    	.card {
        	background: #111;
        	border: 1px solid #00ff41;
        	border-radius: 8px;
        	padding: 18px;
        	margin-bottom: 15px;
        	word-wrap: break-word;
    	}
    	.card .label {
        	color: #55ff88;
        	font-weight: bold;
        	display: inline-block;
        	width: 180px;
    	}
    	.card .value {
        	color: #aaffaa;
        	display: inline-block;
    	}
    	.card .address-box {
        	background: #0a0a0a;
        	border-left: 3px solid #00ff41;
        	padding: 10px 15px;
        	margin-top: 10px;
        	border-radius: 4px;
    	}
    	.return-table {
        	width: 100%;
        	border-collapse: collapse;
        	margin-top: 12px;
        	font-size: 14px;
    	}
    	.return-table th, .return-table td {
        	border: 1px solid #00ff41;
        	padding: 10px 12px;
        	text-align: left;

}
    	.return-table th {
        	background: #00ff41;
        	color: #000;
        	font-weight: bold;
    	}
    	.return-table td {
        	color: #ccffcc;
    	}
    	.status-badge {
        	display: inline-block;
        	padding: 4px 12px;
        	border-radius: 20px;
        	font-weight: bold;
        	font-size: 13px;
        	background: #00aa33;
        	color: #000;
    	}
    	.status-badge.inactive {
        	background: #aa3333;
        	color: #fff;
    	}
    	.dev-footer {
        	text-align: center;
        	margin-top: 25px;
        	padding-top: 15px;
        	border-top: 1px solid #00ff41;
        	color: #55aa55;
        	font-size: 14px;
    	}
    	.dev-footer a {
        	color: #00ff41;
        	text-decoration: none;
        	font-weight: bold;
    	}
    	.dev-footer a:hover {
        	text-decoration: underline;
    	}
    	.error {
        	color: #ff4444;
        	border: 2px solid #ff4444;
        	padding: 15px;
        	border-radius: 8px;
        	background: #220000;
    	}
    	@media (max-width: 600px) {
        	.container { padding: 15px; }
        	.input-section { flex-direction: column; }
        	.card .label { width: 100%; display: block; margin-bottom: 4px; }
        	.return-table { font-size: 12px; }
        	.return-table th, .return-table td { padding: 6px 8px; }
    	}
	</style>
</head>
<body>
	<div class="container">
    	<h1>⚡ GSTIN INFO — DEMON API ⚡</h1>
    	
    	<div class="input-section">
        	<input type="text" id="gstinInput" placeholder="Enter GSTIN (e.g. 09AAYFK4129N1ZF)" value="09AAYFK4129N1ZF">
        	<button onclick="fetchGSTIN()">🔍 SEARCH</button>
    	</div>

    	<div class="loader" id="loader"><span>⏳ FETCHING DATA...</span></div>

    	<div id="result"></div>

    	<div class="dev-footer">
        	🛠️ DEVELOPER: <a href="https://t.me/Boss_hcrr" target="_blank">Fighter Modz</a> &nbsp;|&nbsp;
        	📡 API: <span id="apiDisplay">anon-gst-info.vercel.app</span>
    	</div>
	</div>

	<script>
    	// =============================================
    	// 🔥 CONFIGURATION — CHANGE KARO YAHAN
    	// =============================================
    	const CONFIG = {
        	API_BASE: 'https://anon-gst-info.vercel.app/advanced/gstin',
        	API_KEY: 'tempg2206',  // Change karo agar chahiye
        	DEVELOPER_NAME: 'YOUR_NAME',  // Change karo
        	DEVELOPER_TELEGRAM: 'https://t.me/your_telegram',  // Change karo
        	DEVELOPER_CREDITS: 'mr_anonymous_404.t.me' // Original developer credit
    	};

    	// DOM references
    	const resultDiv = document.getElementById('result');
    	const loaderDiv = document.getElementById('loader');
    	const gstinInput = document.getElementById('gstinInput');
    	const apiDisplay = document.getElementById('apiDisplay');

    	// Show API URL in footer
    	apiDisplay.textContent = CONFIG.API_BASE;

    	// =============================================
    	// 🔥 MAIN FUNCTION — FETCH GSTIN DATA
    	// =============================================
    	async function fetchGSTIN() {
        	const gstin = gstinInput.value.trim().toUpperCase();
        	if (!gstin) {
            	resultDiv.innerHTML = <div class="error">❌ Please enter a valid GSTIN!</div>;
            	return;
        	}

        	// Show loader
        	loaderDiv.style.display = 'block';
        	resultDiv.innerHTML = '';

        	try {
            	// 🔥 NEW API URL — CHANGE KARO YAHAN
            	const apiUrl = ${CONFIG.API_BASE}?key=${CONFIG.API_KEY}&gstin=${gstin};
            	
            	const response = await fetch(apiUrl);
            	const data = await response.json();

if (!data.response !data.response.data data.response.data.length === 0) {
                	throw new Error('No data found for this GSTIN');
            	}

            	// Extract data
            	const gstData = data.response.data[0];
            	const params = data.response.parameters;

            	// Render the data
            	renderGSTData(gstData, params, data.developer);

        	} catch (error) {
            	resultDiv.innerHTML = <div class="error">❌ ERROR: ${error.message}</div>;
        	} finally {
            	loaderDiv.style.display = 'none';
        	}
    	}

    	// =============================================
    	// 🔥 RENDER FUNCTION — SHOW DATA BEAUTIFULLY
    	// =============================================
    	function renderGSTData(data, params, originalDev) {
        	const addr = data.principal_address.address_details;
        	const returns = data.current_year_returns || [];

        	let html =
            	<div class="card">
                	<div><span class="label">🔹 GSTIN:</span> <span class="value">${data.gstin}</span></div>
                	<div><span class="label">🔹 Legal Name:</span> <span class="value">${data.legal_name}</span></div>
                	<div><span class="label">🔹 Trade Name:</span> <span class="value">${data.trade_name}</span></div>
                	<div><span class="label">🔹 PAN:</span> <span class="value">${data.pan}</span></div>
                	<div><span class="label">🔹 Status:</span> <span class="status-badge">${data.status}</span></div>
                	<div><span class="label">🔹 Taxpayer Type:</span> <span class="value">${data.taxpayer_type}</span></div>
                	<div><span class="label">🔹 Constitution:</span> <span class="value">${data.constitution_of_business}</span></div>
                	<div><span class="label">🔹 Registration Date:</span> <span class="value">${data.registration_date}</span></div>
                	<div><span class="label">🔹 Last Updated:</span> <span class="value">${data.last_updated_date}</span></div>
                	<div><span class="label">🔹 E-Invoice Status:</span> <span class="value">${data.einvoice_status || 'N/A'}</span></div>
                	<div><span class="label">🔹 State Jurisdiction:</span> <span class="value">${data.state_jurisdiction}</span></div>
                	<div><span class="label">🔹 Central Jurisdiction:</span> <span class="value">${data.central_jurisdiction}</span></div>
                	<div><span class="label">🔹 Nature of Business:</span> <span class="value">${data.nature_of_business_activities.join(', ')}</span></div>
            	</div>

            	<div class="card">
                	<div style="font-weight:bold; margin-bottom:8px;">📍 PRINCIPAL ADDRESS</div>
                	<div class="address-box">
                    	<div>${addr.building_number ? addr.building_number + ', ' : ''}${addr.building_name ? addr.building_name + ', ' : ''}${addr.street}</div>
                    	<div>${addr.locality}, ${addr.district}, ${addr.state} — ${addr.pincode}</div>
                    	<div style="color:#55aa55; font-size:13px;">📍 Lat: ${addr.latitude} | Lon: ${addr.longitude}</div>
                    	<div style="color:#55aa55; font-size:13px;">🏢 Premises: ${data.principal_address.nature_of_premises}</div>
                	</div>
            	</div>

            	<div class="card">
                	<div style="font-weight:bold; margin-bottom:8px;">📊 CURRENT YEAR RETURNS (${returns.length})</div>
                	${returns.length > 0 ?
                	<table class="return-table">
                    	<thead>
                        	<tr>

<th>Return Type</th>
                            	<th>Period</th>
                            	<th>Filing Date</th>
                            	<th>Status</th>
                            	<th>ARN</th>
                        	</tr>
                    	</thead>
                    	<tbody>
                        	${returns.map(r =>
                            	<tr>
                                	<td>${r.return_type}</td>
                                	<td>${r.return_period}</td>
                                	<td>${r.filing_date}</td>
                                	<td><span class="status-badge" style="background: ${r.status === 'Filed' ? '#00aa33' : '#aa3333'};">${r.status}</span></td>
                                	<td style="font-size:12px;">${r.arn}</td>
                            	</tr>
                        	).join('')}
                    	</tbody>
                	</table>
                	: <div style="color:#55aa55;">No returns filed yet.</div>}
            	</div>

            	<div class="card" style="border-color:#555; opacity:0.7;">
                	<div style="font-size:13px;">
                    	⚙️ API Service: ${params.service} | Success: ${params.success ? '✅' : '❌'}
                    	<br>🔑 Original Developer: ${originalDev || 'N/A'}
                    	<br>🛠️ Modified By: <strong>${CONFIG.DEVELOPER_NAME}</strong>
                	</div>
            	</div>
        	;

        	resultDiv.innerHTML = html;
    	}

    	// =============================================
    	// 🔥 AUTO-FETCH ON LOAD (Demo)
    	// =============================================
    	window.addEventListener('DOMContentLoaded', () => {
        	// Auto-fetch default GSTIN
        	fetchGSTIN();
    	});

    	// Enter key support
    	gstinInput.addEventListener('keypress', (e) => {
        	if (e.key === 'Enter') fetchGSTIN();
    	});

    	// =============================================
    	// 🔥 CUSTOM API URL CHANGE FUNCTION
    	// =============================================
    	// Agar naya API URL chahiye toh function call karo:
    	function setAPI(newBaseUrl, newKey) {
        	CONFIG.API_BASE = newBaseUrl;
        	CONFIG.API_KEY = newKey || CONFIG.API_KEY;
        	apiDisplay.textContent = newBaseUrl;
        	console.log('✅ API Updated to:', newBaseUrl);
    	}

    	// Example: setAPI('https://your-new-api.com/gstin', 'your_new_key');
    	// setAPI('https://your-api.com/gstin', 'newkey123');

    	// Agar developer name change karna hai:
    	function setDeveloper(name, telegram) {
        	CONFIG.DEVELOPER_NAME = name;
        	CONFIG.DEVELOPER_TELEGRAM = telegram || CONFIG.DEVELOPER_TELEGRAM;
        	document.querySelector('.dev-footer a').textContent = name;
        	document.querySelector('.dev-footer a').href = telegram || '#';
        	console.log('✅ Developer Updated to:', name);
    	}

    	// Example: setDeveloper('Fighter Modz', 'https://t.me/Boss_Hcrr');
    	// setDeveloper('Fighter Modz', 'https://t.me/Boss_Hcrr);

    	console.log('🔥 DEMON API READY!');
    	console.log('📡 Current API:', CONFIG.API_BASE);
    	console.log('👤 Developer:', CONFIG.DEVELOPER_NAME);
	</script>
</body>
</html>
